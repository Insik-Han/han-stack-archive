name: 🔁 CI

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - '.github/workflows/ci.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'prisma/**'
      - 'src/**'
      - 'tsconfig.json'
      - 'vite.config.ts'

jobs:
  biome:
    name: ▲ Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: 🔬 Lint
        run: biome ci .

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile

      - name: 🛠 Setup Database
        run: pnpm run migrate && pnpm run generate

      - name: 🔎 Type check
        run: pnpm run tsc

