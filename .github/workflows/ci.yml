name: 🔁 CI

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
    paths:
      - '.github/workflows/ci.yml'
      - 'bun.lock'
      - 'package.json'
      - 'prisma/**'
      - 'src/**'
      - 'tsconfig.json'
      - 'vite.config.ts'

jobs:
  biome:
    name: ▲ Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: 🔬 Lint
        run: biome ci .

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 📥 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.16

      - name: 📥 Download deps
        run: bun install

      - name: 🛠 Setup Database
        run: bun run migrate && bun run generate

      - name: 🔎 Type check
        run: bun run tsc

  # vitest:
